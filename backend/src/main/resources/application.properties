# ============================================================
#  application.properties
#  This file configures how Spring Boot connects to MySQL.
#  IMPORTANT: Change the password to YOUR MySQL root password.
# ============================================================

# --- MySQL Connection ---
spring.datasource.url=jdbc:mysql://localhost:3306/smart_travel_planner?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD

# --- JPA / Hibernate Settings ---
# "update" means: don't drop tables, just update structure if needed
spring.jpa.hibernate.ddl-auto=update
# Shows the SQL queries in the console (helpful for learning/debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Server ---
server.port=8080
